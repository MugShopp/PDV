<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MugShopp PDV 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #bf9a5a; --bg: #f8f9fa; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 90px; color: #1a1a1a; }
        .card-3d { background: white; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.02); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 600; background: none; border: none; cursor: pointer; }
        .nav-item.active { color: #10b981; }
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; }
        input, select { border-radius: 12px; border: 1px solid #e2e8f0; padding: 12px; width: 100%; outline: none; font-size: 14px; background: white; }
        .btn-gold { background: black; color: white; padding: 14px; border-radius: 14px; font-weight: 700; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; border: none; }
        .btn-outline { border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; font-size: 11px; font-weight: bold; width: 100%; text-align: center; }
        .tab-content { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <header class="p-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <img src="https://i.postimg.cc/T190pkF7/Copia-de-Novo-Logotipo-2026-20260127-183120-0000.png" class="h-10 w-10 object-contain rounded-full">
            <h1 class="text-lg font-extrabold tracking-tighter uppercase">MugShopp <span class="text-[#bf9a5a]">PDV</span></h1>
        </div>
    </header>

    <main class="p-4 max-w-4xl mx-auto">
        <section id="content-home" class="tab-content">
            <div class="card-3d p-6 mb-6"><canvas id="chartLinha" height="200"></canvas></div>
            <div class="grid grid-cols-2 gap-4">
                <div class="card-3d p-5 text-center bg-gray-50">
                    <p class="text-[9px] font-bold text-gray-400 uppercase text-center">Referência Anterior</p>
                    <input type="number" id="vendas-manual-anterior" class="text-xl font-bold text-center bg-transparent border-none w-full" value="0">
                </div>
                <div class="card-3d p-5 text-center border-b-4 border-[#10b981]">
                    <p class="text-[9px] font-bold text-[#10b981] uppercase">Vendas no Mês</p>
                    <h4 id="vendas-mes-atual" class="text-2xl font-bold">R$ 0,00</h4>
                </div>
            </div>
        </section>

        <section id="content-vender" class="tab-content hidden space-y-4">
            <div class="card-3d p-6 space-y-4">
                <select id="venda-cliente"><option value="">Consumidor Final</option></select>
                <div class="grid grid-cols-12 gap-2">
                    <select id="venda-produto-select" class="col-span-8"></select>
                    <input type="number" id="venda-qtd" value="1" min="1" class="col-span-4 text-center">
                </div>
                <button onclick="addItem()" class="btn-gold" style="background:#333;">Adicionar Item</button>
                <div id="carrinho-lista" class="divide-y divide-gray-100 py-2"></div>
                <select id="venda-pagamento"><option>Pix</option><option>Cartão</option><option>Dinheiro</option></select>
                <div class="pt-4 border-t space-y-3">
                    <div class="flex justify-between font-bold text-xl"><span>Total:</span><span class="text-[#bf9a5a]">R$ <span id="venda-total-display">0,00</span></span></div>
                    <button onclick="salvarVenda()" class="btn-gold">Finalizar & Gerar Recibo</button>
                </div>
            </div>
            <h3 class="font-bold text-[10px] text-gray-400 uppercase px-2 mt-4">Histórico de Vendas</h3>
            <div id="lista-vendas-view" class="space-y-2 pb-10"></div>
        </section>

        <section id="content-clientes" class="tab-content hidden space-y-4">
            <div class="card-3d p-6 space-y-3">
                <input type="hidden" id="cli-id-edit">
                <input type="text" id="cli-nome" placeholder="Nome Completo">
                <div class="grid grid-cols-2 gap-2"><input type="text" id="cli-fone" placeholder="WhatsApp"><input type="email" id="cli-email" placeholder="E-mail"></div>
                <div class="grid grid-cols-2 gap-2"><input type="text" id="cli-cidade" placeholder="Cidade"><input type="text" id="cli-cpf" placeholder="CPF/CNPJ"></div>
                <input type="text" id="cli-endereco" placeholder="Endereço Completo">
                <button onclick="salvarCliente()" id="btn-cli-acao" class="btn-gold">Salvar Cliente</button>
            </div>
            <div id="lista-cli-view" class="space-y-2"></div>
        </section>

        <section id="content-produtos" class="tab-content hidden space-y-4"><div class="card-3d p-6 space-y-3"><input type="text" id="prod-nome" placeholder="Produto"><input type="number" id="prod-preco" placeholder="R$"><button onclick="salvarProd()" class="btn-gold">Cadastrar Item</button></div><div id="lista-prod-view" class="space-y-2"></div></section>
        <section id="content-gastos" class="tab-content hidden space-y-4"><div class="card-3d p-6 space-y-3"><input type="text" id="gasto-nome" placeholder="Descrição Saída"><input type="number" id="gasto-valor" placeholder="R$"><button onclick="salvarGasto()" class="btn-gold">Lançar Gasto</button></div><div id="lista-gastos-view" class="space-y-2"></div></section>
        <section id="content-ajustes" class="tab-content hidden space-y-4">
            <div class="card-3d p-6 space-y-4 text-center">
                <h3 class="font-bold text-xs uppercase mb-2">Dados do Sistema</h3>
                <button onclick="exportarBackup()" class="btn-outline text-blue-600">Exportar Backup (.JSON)</button>
                <label class="btn-outline text-green-600 cursor-pointer block">Importar Backup <input type="file" id="up-bkp" class="hidden" onchange="importarBackup(this)"></label>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button onclick="showTab('home')" id="nav-home" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>Home</button>
        <button onclick="showTab('vender')" id="nav-vender" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>Vendas</button>
        <button onclick="showTab('clientes')" id="nav-clientes" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>Cli</button>
        <button onclick="showTab('produtos')" id="nav-produtos" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>Itens</button>
        <button onclick="showTab('ajustes')" id="nav-ajustes" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09"></path></svg>Config</button>
    </nav>
        <script>
        const db = new Dexie("MugShoppDB");
        db.version(30).stores({
            vendas: '++id, data, mes, total',
            gastos: '++id, data, mes, valor',
            clientes: '++id, nome, fone, email, cidade, cpf, endereco',
            produtos: '++id, nome, preco'
        });

        let carrinho = []; let chartObj = null;

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('content-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
            if(id === 'home') atualizarDash();
            if(id === 'vender') { initVender(); listarVendas(); }
            if(id === 'clientes') listarClientes();
            if(id === 'produtos') listarProdutos();
            if(id === 'gastos') listarGastos();
        }

        async function atualizarDash() {
            const mesAtual = new Date().toLocaleDateString('pt-BR').slice(3);
            const v = await db.vendas.where('mes').equals(mesAtual).toArray();
            const g = await db.gastos.where('mes').equals(mesAtual).toArray();
            const totV = v.reduce((a,b)=>a+b.total, 0); const totG = g.reduce((a,b)=>a+b.valor, 0);
            document.getElementById('vendas-mes-atual').innerText = `R$ ${totV.toFixed(2)}`;
            const ctx = document.getElementById('chartLinha').getContext('2d');
            if(chartObj) chartObj.destroy();
            chartObj = new Chart(ctx, { type:'doughnut', data:{labels:['Entradas','Saídas'], datasets:[{data:[totV, totG], backgroundColor:['#10b981','#f87171'], borderWidth:0}]}, options:{plugins:{legend:{position:'bottom'}}}});
        }

        async function initVender() {
            const clis = await db.clientes.toArray(); const prods = await db.produtos.toArray();
            document.getElementById('venda-cliente').innerHTML = '<option value="">Consumidor Final</option>' + clis.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
            document.getElementById('venda-produto-select').innerHTML = '<option value="">Escolher Item...</option>' + prods.map(p => `<option value="${p.id}">${p.nome} - R$ ${p.preco.toFixed(2)}</option>`).join('');
        }

        function addItem() {
            const s = document.getElementById('venda-produto-select');
            db.produtos.get(parseInt(s.value)).then(p => { if(!p) return; const qtd = parseInt(document.getElementById('venda-qtd').value); carrinho.push({...p, qtd, subtotal: p.preco * qtd}); renderCarrinho(); });
        }

        function renderCarrinho() {
            document.getElementById('carrinho-lista').innerHTML = carrinho.map(it => `<div class="flex justify-between py-2 text-xs font-bold border-b"><span>${it.qtd}x ${it.nome}</span><span>R$ ${it.subtotal.toFixed(2)}</span></div>`).join('');
            document.getElementById('venda-total-display').innerText = carrinho.reduce((a,b)=>a+b.subtotal, 0).toFixed(2);
        }

        async function salvarVenda() {
            if(!carrinho.length) return;
            const cid = document.getElementById('venda-cliente').value;
            const cli = cid ? await db.clientes.get(parseInt(cid)) : {nome: "Consumidor Final", cpf: "-"};
            const venda = { data: new Date().toLocaleDateString('pt-BR'), mes: new Date().toLocaleDateString('pt-BR').slice(3), cliente: cli, itens: [...carrinho], total: carrinho.reduce((a,b)=>a+b.subtotal, 0), pagamento: document.getElementById('venda-pagamento').value };
            await db.vendas.add(venda); gerarRecibo(venda); carrinho = []; renderCarrinho(); listarVendas(); atualizarDash();
        }

        async function listarVendas() {
            const d = await db.vendas.reverse().toArray();
            document.getElementById('lista-vendas-view').innerHTML = d.map(v => `
                <div class="card-3d p-4 flex justify-between items-center text-xs">
                    <div onclick='gerarRecibo(${JSON.stringify(v)})' class="cursor-pointer"><b>${v.cliente.nome}</b><p>${v.data} • R$ ${v.total.toFixed(2)}</p></div>
                    <button onclick="if(confirm('Excluir?')) db.vendas.delete(${v.id}).then(() => {listarVendas(); atualizarDash();})" class="text-red-400 font-bold">✕</button>
                </div>`).join('');
        }

        function gerarRecibo(v) {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const logo = "https://i.postimg.cc/T190pkF7/Copia-de-Novo-Logotipo-2026-20260127-183120-0000.png";
            doc.addImage(logo, 'PNG', 15, 12, 25, 25);
            doc.addFont('https://fonts.gstatic.com/s/pinyonscript/v11/6xKtdSByM6T4t6N7D116D1954nQ.ttf', 'PinyonScript', 'normal');
            doc.setFont('PinyonScript'); doc.setFontSize(55); doc.text("MugShopp", 45, 30);
            doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.text("CNPJ: 64.137.780/0001-07 | Taubaté - SP", 47, 36);
            doc.line(15, 45, 195, 45); doc.setFontSize(11); doc.text(`CLIENTE: ${v.cliente.nome}`, 15, 55);
            doc.autoTable({ startY: 65, head: [['Item', 'Qtd', 'Subtotal']], body: v.itens.map(i=>[i.nome, i.qtd, `R$ ${i.subtotal.toFixed(2)}`]), headStyles: {fillColor:[0,0,0]} });
            doc.setFontSize(16); doc.text(`TOTAL: R$ ${v.total.toFixed(2)}`, 195, doc.lastAutoTable.finalY + 15, {align:'right'});
            doc.save(`Recibo_${v.cliente.nome}.pdf`);
        }

        async function salvarCliente() {
            const id = document.getElementById('cli-id-edit').value;
            const data = { nome: document.getElementById('cli-nome').value, fone: document.getElementById('cli-fone').value, email: document.getElementById('cli-email').value, cidade: document.getElementById('cli-cidade').value, cpf: document.getElementById('cli-cpf').value, endereco: document.getElementById('cli-endereco').value };
            if(id) await db.clientes.update(parseInt(id), data); else await db.clientes.add(data);
            limparCli(); listarClientes();
        }
        function editCliente(c) { 
            document.getElementById('cli-id-edit').value = c.id; document.getElementById('cli-nome').value = c.nome; document.getElementById('cli-fone').value = c.fone;
            document.getElementById('cli-email').value = c.email; document.getElementById('cli-cidade').value = c.cidade; document.getElementById('cli-cpf').value = c.cpf;
            document.getElementById('cli-endereco').value = c.endereco; document.getElementById('btn-cli-acao').innerText = "Atualizar"; window.scrollTo(0,0);
        }
        function limparCli() { document.getElementById('cli-id-edit').value = ""; document.querySelectorAll('#content-clientes input').forEach(i => i.value=""); document.getElementById('btn-cli-acao').innerText = "Salvar Cliente"; }
        async function listarClientes() {
            const d = await db.clientes.toArray();
            document.getElementById('lista-cli-view').innerHTML = d.map(c => `<div class="card-3d p-4 flex justify-between items-center" onclick='editCliente(${JSON.stringify(c)})'><div class="text-xs"><b>${c.nome}</b><p>${c.fone}</p></div><span class="text-blue-500 font-bold text-[10px]">EDITAR</span></div>`).join('');
        }

        async function salvarProd() { await db.produtos.add({nome: document.getElementById('prod-nome').value, preco: parseFloat(document.getElementById('prod-preco').value)}); listarProdutos(); }
        async function listarProdutos() { const d = await db.produtos.toArray(); document.getElementById('lista-prod-view').innerHTML = d.map(p => `<div class="card-3d p-3 flex justify-between text-xs font-bold"><span>${p.nome}</span><span>R$ ${p.preco.toFixed(2)}</span></div>`).join(''); }
        async function salvarGasto() { const mes = new Date().toLocaleDateString('pt-BR').slice(3); await db.gastos.add({nome: document.getElementById('gasto-nome').value, valor: parseFloat(document.getElementById('gasto-valor').value), mes: mes}); listarGastos(); atualizarDash(); }
        async function listarGastos() { const d = await db.gastos.reverse().toArray(); document.getElementById('lista-gastos-view').innerHTML = d.map(g => `<div class="card-3d p-4 flex justify-between text-xs"><b>${g.nome}</b><span class="text-red-500">R$ ${g.valor.toFixed(2)}</span></div>`).join(''); }
        
        function exportarBackup() { Promise.all([db.vendas.toArray(), db.clientes.toArray(), db.produtos.toArray(), db.gastos.toArray()]).then(v => { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(v)], {type:"application/json"})); a.download="MugShopp_Bkp.json"; a.click(); }); }
        function importarBackup(i) { const r = new FileReader(); r.onload = (e) => { const [v,c,p,g] = JSON.parse(e.target.result); Promise.all([db.vendas.bulkPut(v), db.clientes.bulkPut(c), db.produtos.bulkPut(p), db.gastos.bulkPut(g)]).then(() => location.reload()); }; r.readAsText(i.files[0]); }

        window.onload = () => showTab('home');
    </script>
</body>
</html>
