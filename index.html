<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MugShopp PDV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #bf9a5a; --bg: #f8f9fa; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 80px; }
        
        .card-3d { 
            background: white; border-radius: 20px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.02);
        }

        /* Menu Inferior Estilo App */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; display: flex; justify-content: space-around;
            padding: 12px 0; border-top: 1px solid #eee; z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 600; }
        .nav-item.active { color: #10b981; } /* Cor verde conforme o print */
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; }

        input, select { border-radius: 12px; border: 1px solid #e2e8f0; padding: 12px; width: 100%; outline: none; }
        .btn-gold { background: black; color: white; padding: 14px; border-radius: 14px; font-weight: 700; width: 100%; transition: 0.3s; }
        .btn-gold:hover { background: var(--gold); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-3">
            <img src="https://i.postimg.cc/T190pkF7/Copia-de-Novo-Logotipo-2026-20260127-183120-0000.png" class="h-10 w-10 object-contain">
            <h1 class="text-xl font-extrabold tracking-tighter">MUGSHOPP <span class="text-[#bf9a5a]">PDV</span></h1>
        </div>
        <div class="flex items-center gap-2 text-[10px] font-bold text-green-500 bg-green-50 px-3 py-1 rounded-full">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Online
        </div>
    </header>

    <main class="max-w-4xl mx-auto">
        <section id="content-home" class="tab-content">
            <div class="card-3d p-6 mb-6">
                <h3 class="text-xs font-bold text-gray-400 uppercase mb-6">Fluxo de Caixa (Entradas vs Saídas)</h3>
                <canvas id="chartLinha" height="180"></canvas>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="card-3d p-5">
                    <p class="text-[9px] font-bold text-gray-400 uppercase">Vendas Mês Anterior</p>
                    <h4 id="vendas-mes-anterior" class="text-2xl font-bold mt-1 text-gray-400">0</h4>
                </div>
                <div class="card-3d p-5 border-l-4 border-[#bf9a5a]">
                    <p class="text-[9px] font-bold text-[#bf9a5a] uppercase">Vendas Mês Atual</p>
                    <h4 id="vendas-mes-atual" class="text-2xl font-bold mt-1">0</h4>
                </div>
            </div>
        </section>

        <section id="content-vender" class="tab-content hidden">
            <div class="card-3d p-6 space-y-4">
                <select id="venda-cliente"></select>
                <div class="flex gap-2">
                    <select id="venda-produto-select"></select>
                    <button onclick="addItem()" class="bg-black text-white px-4 rounded-xl">+</button>
                </div>
                <div id="carrinho-lista" class="space-y-2 py-4"></div>
                <div class="border-t pt-4">
                    <div class="flex justify-between font-bold text-xl mb-4"><span>Total:</span><span>R$ <span id="venda-total-display">0,00</span></span></div>
                    <button onclick="salvarVenda()" class="btn-gold">FINALIZAR VENDA</button>
                </div>
            </div>
        </section>

        <section id="content-gastos" class="tab-content hidden">
            <div class="card-3d p-6 mb-6">
                <h3 class="font-bold text-sm mb-4">Inserir Novo Gasto</h3>
                <div class="grid grid-cols-1 gap-3">
                    <input type="text" id="gasto-nome" placeholder="Descrição do Gasto">
                    <input type="number" id="gasto-valor" placeholder="Valor (R$)">
                    <input type="text" id="gasto-fornecedor" placeholder="Fornecedor">
                    <select id="gasto-pgto">
                        <option value="Pix">Pix</option>
                        <option value="Cartão">Cartão</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>
                    <input type="date" id="gasto-data">
                    <button onclick="salvarGasto()" class="btn-gold">SALVAR GASTO</button>
                </div>
            </div>
            <div id="lista-gastos" class="space-y-3"></div>
        </section>

        <section id="content-config" class="tab-content hidden">
            <div class="card-3d p-6 space-y-6">
                <h3 class="font-bold text-center uppercase text-xs text-[#bf9a5a]">Relatórios e Dados</h3>
                <div class="grid grid-cols-1 gap-3">
                    <button onclick="gerarRelatorioVendas()" class="w-full py-4 border border-gray-200 rounded-xl text-[10px] font-bold uppercase hover:bg-gray-50">Baixar Relatório Mensal de Vendas</button>
                    <button onclick="gerarRelatorioComparativo()" class="w-full py-4 border border-gray-200 rounded-xl text-[10px] font-bold uppercase hover:bg-gray-50">Baixar Entradas x Saídas (Anual)</button>
                </div>
                <div class="pt-6 border-t grid grid-cols-2 gap-2">
                    <button onclick="exportarBackup()" class="bg-gray-100 p-3 rounded-xl text-[9px] font-bold">EXPORTAR BACKUP</button>
                    <label class="bg-gray-100 p-3 rounded-xl text-[9px] font-bold text-center cursor-pointer">IMPORTAR BACKUP<input type="file" id="import-json" class="hidden" onchange="importarBackup(event)"></label>
                </div>
            </div>
        </section>

        <section id="content-clientes" class="tab-content hidden"><div id="lista-cli-view" class="grid gap-4"></div></section>
        <section id="content-produtos" class="tab-content hidden"><div id="lista-prod-view" class="grid gap-4"></div></section>
    </main>

    <nav class="bottom-nav">
        <button onclick="showTab('home')" id="nav-home" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            Resumo
        </button>
        <button onclick="showTab('vender')" id="nav-vender" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            Vender
        </button>
        <button onclick="showTab('clientes')" id="nav-clientes" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            Clientes
        </button>
        <button onclick="showTab('produtos')" id="nav-produtos" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
            Produtos
        </button>
        <button onclick="showTab('gastos')" id="nav-gastos" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            Gastos
        </button>
        <button onclick="showTab('config')" id="nav-config" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            Ajustes
        </button>
    </nav>
        <script>
        const db = new Dexie("MugShoppDB");
        db.version(7).stores({
            vendas: '++id, data, total',
            gastos: '++id, data, valor, fornecedor, pagamento',
            clientes: '++id, nome',
            produtos: '++id, nome, preco'
        });

        let chartObj = null;

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('content-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
            
            if(id === 'home') atualizarDash();
            if(id === 'vender') initVender();
            if(id === 'gastos') { document.getElementById('gasto-data').valueAsDate = new Date(); listarGastos(); }
        }

        async function atualizarDash() {
            const agora = new Date();
            const mesAtual = agora.getMonth();
            const anoAtual = agora.getFullYear();

            const todasVendas = await db.vendas.toArray();
            const todosGastos = await db.gastos.toArray();

            // Comparação de Quantidade de Vendas
            const vAtual = todasVendas.filter(v => {
                const d = new Date(v.data);
                return d.getMonth() === mesAtual && d.getFullYear() === anoAtual;
            }).length;

            const vAnterior = todasVendas.filter(v => {
                const d = new Date(v.data);
                const mesAnt = mesAtual === 0 ? 11 : mesAtual - 1;
                const anoAnt = mesAtual === 0 ? anoAtual - 1 : anoAtual;
                return d.getMonth() === mesAnt && d.getFullYear() === anoAnt;
            }).length;

            document.getElementById('vendas-mes-atual').innerText = vAtual;
            document.getElementById('vendas-mes-anterior').innerText = vAnterior;

            renderizarGraficoLinha(todasVendas, todosGastos);
        }

        function renderizarGraficoLinha(vendas, gastos) {
            const ctx = document.getElementById('chartLinha').getContext('2d');
            if(chartObj) chartObj.destroy();

            // Agrupar por mês para o gráfico (últimos 6 meses)
            const meses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
            const labels = [];
            const dataVendas = [];
            const dataGastos = [];

            for(let i = 5; i >= 0; i--) {
                const d = new Date();
                d.setMonth(d.getMonth() - i);
                const m = d.getMonth();
                const a = d.getFullYear();
                labels.push(meses[m]);

                const totalV = vendas.filter(v => new Date(v.data).getMonth() === m && new Date(v.data).getFullYear() === a).reduce((s, x) => s + x.total, 0);
                const totalG = gastos.filter(g => new Date(g.data).getMonth() === m && new Date(g.data).getFullYear() === a).reduce((s, x) => s + x.valor, 0);
                dataVendas.push(totalV);
                dataGastos.push(totalG);
            }

            chartObj = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Entradas', data: dataVendas, borderColor: '#10b981', backgroundColor: '#10b98122', fill: true, tension: 0.4 },
                        { label: 'Saídas', data: dataGastos, borderColor: '#ef4444', backgroundColor: '#ef444422', fill: true, tension: 0.4 }
                    ]
                },
                options: { 
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 8, font: { size: 10 } } } },
                    scales: { y: { display: false }, x: { grid: { display: false } } }
                }
            });
        }

        async function salvarGasto() {
            const nome = document.getElementById('gasto-nome').value;
            const valor = parseFloat(document.getElementById('gasto-valor').value);
            if(!nome || !valor) return alert("Preencha descrição e valor");

            await db.gastos.add({
                nome, valor,
                fornecedor: document.getElementById('gasto-fornecedor').value,
                pagamento: document.getElementById('gasto-pgto').value,
                data: document.getElementById('gasto-data').value
            });
            
            alert("Gasto salvo!");
            document.getElementById('gasto-nome').value = "";
            document.getElementById('gasto-valor').value = "";
            listarGastos();
        }

        async function listarGastos() {
            const list = await db.gastos.orderBy('data').reverse().toArray();
            document.getElementById('lista-gastos').innerHTML = list.map(g => `
                <div class="card-3d p-4 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-xs uppercase">${g.nome}</p>
                        <p class="text-[9px] text-gray-400">${g.data} | ${g.fornecedor || 'Geral'}</p>
                    </div>
                    <p class="font-bold text-red-500 text-sm">- R$ ${g.valor.toFixed(2)}</p>
                </div>
            `).join('');
        }

        // --- RELATÓRIOS ---
        async function gerarRelatorioVendas() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const vendas = await db.vendas.toArray();
            doc.text("MugShopp - Relatório de Vendas", 14, 20);
            doc.autoTable({ startY: 30, head: [['Data', 'Total']], body: vendas.map(v => [v.data, `R$ ${v.total.toFixed(2)}`]) });
            doc.save("Vendas_Mensal.pdf");
        }

        async function gerarRelatorioComparativo() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const v = await db.vendas.toArray(); const g = await db.gastos.toArray();
            const totV = v.reduce((s, x) => s + x.total, 0);
            const totG = g.reduce((s, x) => s + x.valor, 0);
            doc.text("MugShopp - Comparativo Entradas x Saídas", 14, 20);
            doc.autoTable({ startY: 30, head: [['Tipo', 'Total']], body: [['Entradas', `R$ ${totV.toFixed(2)}`], ['Saídas', `R$ ${totG.toFixed(2)}`], ['Saldo', `R$ ${(totV - totG).toFixed(2)}`]] });
            doc.save("Comparativo_Financeiro.pdf");
        }

        // --- BACKUP E INITS ---
        async function initVender() {
            const clis = await db.clientes.toArray(); const prods = await db.produtos.toArray();
            document.getElementById('venda-cliente').innerHTML = clis.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
            document.getElementById('venda-produto-select').innerHTML = prods.map(p => `<option value="${p.id}">${p.nome} - R$ ${p.preco}</option>`).join('');
        }

        async function exportarBackup() {
            const d = { v: await db.vendas.toArray(), g: await db.gastos.toArray(), c: await db.clientes.toArray(), p: await db.produtos.toArray() };
            const blob = new Blob([JSON.stringify(d)], {type:'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "MugShopp_Backup.json"; a.click();
        }

        window.onload = () => showTab('home');
    </script>
</body>
</html>
