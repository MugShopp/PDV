<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MugShopp PDV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #bf9a5a; --bg: #f8f9fa; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 90px; color: #1a1a1a; }
        .card-3d { background: white; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.02); overflow: hidden; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 600; background: none; border: none; cursor: pointer; }
        .nav-item.active { color: #10b981; }
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; }
        input, select { border-radius: 12px; border: 1px solid #e2e8f0; padding: 12px; width: 100%; outline: none; font-size: 14px; background: white; }
        .btn-gold { background: black; color: white; padding: 14px; border-radius: 14px; font-weight: 700; width: 100%; transition: 0.3s; cursor: pointer; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; border: none; }
        .btn-outline { border: 1px solid #e2e8f0; padding: 10px; border-radius: 12px; font-size: 10px; font-weight: bold; text-align: center; cursor: pointer; background: white; display: block; width: 100%; }
        .tab-content { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <header class="p-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <img src="https://i.postimg.cc/T190pkF7/Copia-de-Novo-Logotipo-2026-20260127-183120-0000.png" class="h-10 w-10 object-contain rounded-full">
            <h1 class="text-lg font-extrabold tracking-tighter uppercase">MugShopp <span class="text-[#bf9a5a]">PDV</span></h1>
        </div>
    </header>
    <main class="p-4 max-w-4xl mx-auto">
        <section id="content-home" class="tab-content">
            <div class="card-3d p-6 mb-6">
                <h3 class="text-[10px] font-bold text-gray-400 uppercase mb-4">Evolução Financeira (Ganhos vs Gastos)</h3>
                <canvas id="chartLinha" height="200"></canvas>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="card-3d p-5 text-center bg-gray-50">
                    <p class="text-[9px] font-bold text-gray-400 uppercase">Vendas Mês Anterior (Manual)</p>
                    <input type="number" id="vendas-manual-anterior" onchange="salvarMeta()" class="text-xl font-bold text-center bg-transparent border-none p-0 w-full" value="0">
                </div>
                <div class="card-3d p-5 text-center border-b-4 border-[#10b981]">
                    <p class="text-[9px] font-bold text-[#10b981] uppercase">Vendas Mês Atual</p>
                    <h4 id="vendas-mes-atual" class="text-2xl font-bold">0</h4>
                </div>
            </div>
        </section>

        <section id="content-vender" class="tab-content hidden">
            <div class="card-3d p-6 space-y-4">
                <select id="venda-cliente"><option value="">Selecionar Cliente</option></select>
                <div class="flex gap-2">
                    <select id="venda-produto-select" class="flex-1"><option value="">Selecionar Produto</option></select>
                    <input type="number" id="venda-quantidade" value="1" min="1" class="w-20">
                    <button onclick="addItem()" class="bg-black text-white px-5 rounded-xl font-bold text-xl">+</button>
                </div>
                <div id="carrinho-lista" class="divide-y divide-gray-100 py-2"></div>
                <div class="pt-4 border-t space-y-3">
                    <div class="flex justify-between font-bold text-xl"><span>Total:</span><span class="text-[#bf9a5a]">R$ <span id="venda-total-display">0,00</span></span></div>
                    <button onclick="salvarVenda()" class="btn-gold">Finalizar e Gerar Recibo</button>
                </div>
            </div>
            <div id="lista-vendas" class="mt-4 space-y-2"></div>
        </section>

        <section id="content-clientes" class="tab-content hidden space-y-4">
            <div class="card-3d p-6 space-y-3">
                <input type="text" id="new-cli-nome" placeholder="Nome do Cliente">
                <input type="text" id="new-cli-fone" placeholder="Telefone">
                <input type="text" id="new-cli-email" placeholder="Email">
                <input type="text" id="new-cli-cidade" placeholder="Cidade">
                <input type="text" id="new-cli-cpf" placeholder="CPF">
                <button onclick="salvarEntidade('clientes')" class="btn-gold">Cadastrar Cliente</button>
            </div>
            <div id="lista-cli-view" class="space-y-2"></div>
        </section>

        <section id="content-gastos" class="tab-content hidden space-y-4">
            <div class="card-3d p-6 space-y-3">
                <input type="text" id="gasto-nome" placeholder="O que comprou?">
                <input type="number" id="gasto-valor" placeholder="Valor (R$)">
                <input type="date" id="gasto-data">
                <button onclick="salvarGasto()" class="btn-gold">Salvar Gasto</button>
            </div>
            <div id="lista-gastos" class="space-y-2"></div>
        </section>
    </main>
    <script>
const db = new Dexie("MugShoppDB");
db.version(11).stores({
    vendas: '++id, data, total',
    gastos: '++id, data, valor',
    clientes: '++id, nome, fone, email, cidade, cpf',
    produtos: '++id, nome, preco',
    meta: 'id, valor'
});

let carrinho = [];

async function addItem() {
    const id = document.getElementById('venda-produto-select').value;
    const qtd = parseInt(document.getElementById('venda-quantidade').value) || 1;
    if(!id) return;
    const p = await db.produtos.get(parseInt(id));
    carrinho.push({...p, quantidade: qtd});
    renderCarrinho();
}

function renderCarrinho() {
    document.getElementById('carrinho-lista').innerHTML = carrinho.map((item, i) => `
        <div class="flex justify-between py-2 text-xs font-bold">
            <span>${item.nome} x${item.quantidade}</span>
            <div class="flex gap-4">
                <span>R$ ${(item.preco * item.quantidade).toFixed(2)}</span>
                <button onclick="carrinho.splice(${i},1);renderCarrinho()" class="text-red-400">✕</button>
            </div>
        </div>`).join('');
    const total = carrinho.reduce((a, b) => a + (b.preco * b.quantidade), 0);
    document.getElementById('venda-total-display').innerText = total.toFixed(2).replace('.',',');
}

async function salvarVenda() {
    const total = carrinho.reduce((a, b) => a + (b.preco * b.quantidade), 0);
    const cliente = document.getElementById('venda-cliente').value || "Consumidor";
    const venda = { data: new Date().toISOString().split('T')[0], total, cliente, itens: [...carrinho] };
    await db.vendas.add(venda);
    gerarReciboPDF(venda);
    carrinho = [];
    renderCarrinho();
    listarVendas();
}

function gerarReciboPDF(v) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.text("MUGSHOPP", 14, 10);
    doc.text("CNPJ: 00.000.000/0001-00", 14, 15);
    doc.text("Cliente: " + v.cliente, 14, 25);

    doc.autoTable({
        startY: 30,
        head: [['Qtd', 'Produto', 'Unit', 'Total']],
        body: v.itens.map(i => [
            i.quantidade,
            i.nome,
            i.preco.toFixed(2),
            (i.preco * i.quantidade).toFixed(2)
        ])
    });

    doc.text("TOTAL: R$ " + v.total.toFixed(2), 14, doc.lastAutoTable.finalY + 10);
    doc.text("Forma: PIX", 14, doc.lastAutoTable.finalY + 15);
    doc.text("Status: Pago", 14, doc.lastAutoTable.finalY + 20);
    doc.text("Data: " + v.data, 14, doc.lastAutoTable.finalY + 25);

    doc.save("recibo.pdf");
}

async function listarVendas() {
    const v = await db.vendas.toArray();
    document.getElementById('lista-vendas').innerHTML = v.map(x => `
        <div class="card-3d p-3 text-xs">
            <b>${x.cliente}</b> - R$ ${x.total.toFixed(2)}
        </div>
    `).join('');
}

async function salvarEntidade(tipo) {
    if(tipo === 'clientes'){
        await db.clientes.add({
            nome: document.getElementById('new-cli-nome').value,
            fone: document.getElementById('new-cli-fone').value,
            email: document.getElementById('new-cli-email').value,
            cidade: document.getElementById('new-cli-cidade').value,
            cpf: document.getElementById('new-cli-cpf').value
        });
    }
    listarEntidades(tipo);
}

async function listarGastos() {
    const list = await db.gastos.toArray();
    document.getElementById('lista-gastos').innerHTML = list.map(g => `
        <div class="card-3d p-4 flex justify-between">
            <input value="${g.nome}" onchange="editar('gastos',${g.id},'nome',this.value)">
            <input value="${g.valor}" onchange="editar('gastos',${g.id},'valor',this.value)">
            <button onclick="db.gastos.delete(${g.id}).then(listarGastos)">✕</button>
        </div>
    `).join('');
}
</script>
</body>
</html>
