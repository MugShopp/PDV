<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MugShopp PDV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #bf9a5a; --bg: #f8f9fa; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 90px; color: #1a1a1a; }
        .card-3d { background: white; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.02); overflow: hidden; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 600; background: none; border: none; cursor: pointer; }
        .nav-item.active { color: #10b981; }
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; }
        input, select { border-radius: 12px; border: 1px solid #e2e8f0; padding: 12px; width: 100%; outline: none; font-size: 14px; background: white; }
        .btn-gold { background: black; color: white; padding: 14px; border-radius: 14px; font-weight: 700; width: 100%; transition: 0.3s; cursor: pointer; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; border: none; }
        .btn-outline { border: 1px solid #e2e8f0; padding: 10px; border-radius: 12px; font-size: 10px; font-weight: bold; text-align: center; cursor: pointer; background: white; display: block; width: 100%; }
        .tab-content { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <header class="p-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <img src="https://i.postimg.cc/T190pkF7/Copia-de-Novo-Logotipo-2026-20260127-183120-0000.png" class="h-10 w-10 object-contain rounded-full">
            <h1 class="text-lg font-extrabold tracking-tighter uppercase">MugShopp <span class="text-[#bf9a5a]">PDV</span></h1>
        </div>
    </header>
        <main class="p-4 max-w-4xl mx-auto">
        <section id="content-home" class="tab-content">
            <div class="card-3d p-6 mb-6">
                <h3 class="text-[10px] font-bold text-gray-400 uppercase mb-4">Evolução Financeira (Ganhos vs Gastos)</h3>
                <canvas id="chartLinha" height="200"></canvas>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="card-3d p-5 text-center bg-gray-50">
                    <p class="text-[9px] font-bold text-gray-400 uppercase">Vendas Mês Anterior (Manual)</p>
                    <input type="number" id="vendas-manual-anterior" onchange="salvarMeta()" class="text-xl font-bold text-center bg-transparent border-none p-0 w-full" value="0">
                </div>
                <div class="card-3d p-5 text-center border-b-4 border-[#10b981]">
                    <p class="text-[9px] font-bold text-[#10b981] uppercase">Vendas Mês Atual</p>
                    <h4 id="vendas-mes-atual" class="text-2xl font-bold">0</h4>
                </div>
            </div>
        </section>

        <section id="content-vender" class="tab-content hidden">
            <div class="card-3d p-6 space-y-4">
                <select id="venda-cliente"><option value="">Selecionar Cliente</option></select>
                <div class="flex gap-2">
                    <select id="venda-produto-select" class="flex-1"><option value="">Selecionar Produto</option></select>
                    <button onclick="addItem()" class="bg-black text-white px-5 rounded-xl font-bold text-xl">+</button>
                </div>
                <div id="carrinho-lista" class="divide-y divide-gray-100 py-2"></div>
                <div class="pt-4 border-t space-y-3">
                    <div class="flex justify-between font-bold text-xl"><span>Total:</span><span class="text-[#bf9a5a]">R$ <span id="venda-total-display">0,00</span></span></div>
                    <button onclick="salvarVenda()" class="btn-gold">Finalizar e Gerar Recibo</button>
                </div>
            </div>
        </section>

        <section id="content-clientes" class="tab-content hidden space-y-4">
            <div class="card-3d p-6 space-y-3">
                <input type="text" id="new-cli-nome" placeholder="Nome do Cliente">
                <input type="text" id="new-cli-fone" placeholder="Telefone">
                <button onclick="salvarEntidade('clientes')" class="btn-gold">Cadastrar Cliente</button>
                <label class="btn-outline">Importar CSV de Clientes<input type="file" class="hidden" accept=".csv" onchange="importarCSV(this, 'clientes')"></label>
            </div>
            <div id="lista-cli-view" class="space-y-2"></div>
        </section>

        <section id="content-produtos" class="tab-content hidden space-y-4">
            <div class="card-3d p-6 space-y-3">
                <input type="text" id="new-prod-nome" placeholder="Nome do Produto">
                <input type="number" id="new-prod-preco" placeholder="Preço (R$)">
                <button onclick="salvarEntidade('produtos')" class="btn-gold">Cadastrar no Estoque</button>
                <label class="btn-outline">Importar CSV de Produtos<input type="file" class="hidden" accept=".csv" onchange="importarCSV(this, 'produtos')"></label>
            </div>
            <div id="lista-prod-view" class="space-y-2"></div>
        </section>

        <section id="content-gastos" class="tab-content hidden space-y-4">
            <div class="card-3d p-6 space-y-3">
                <input type="text" id="gasto-nome" placeholder="O que comprou?">
                <input type="number" id="gasto-valor" placeholder="Valor (R$)">
                <input type="date" id="gasto-data">
                <button onclick="salvarGasto()" class="btn-gold">Salvar Gasto</button>
            </div>
            <div id="lista-gastos" class="space-y-2"></div>
        </section>

        <section id="content-config" class="tab-content hidden space-y-4">
            <div class="card-3d p-6 text-center space-y-4">
                <h3 class="font-bold text-xs uppercase text-[#bf9a5a]">Relatórios & Segurança</h3>
                <button onclick="gerarPDFRelatorio()" class="btn-outline">Download Relatório de Vendas (PDF)</button>
                <button onclick="exportarBackup()" class="btn-outline bg-gray-50">Fazer Download do Backup (JSON)</button>
                <label class="btn-outline cursor-pointer">Restaurar Backup<input type="file" class="hidden" onchange="importarBackup(event)"></label>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button onclick="showTab('home')" id="nav-home" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>Home</button>
        <button onclick="showTab('vender')" id="nav-vender" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>Vender</button>
        <button onclick="showTab('clientes')" id="nav-clientes" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>Clientes</button>
        <button onclick="showTab('produtos')" id="nav-produtos" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>Estoque</button>
        <button onclick="showTab('gastos')" id="nav-gastos" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line></svg>Gastos</button>
        <button onclick="showTab('config')" id="nav-config" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>Ajustes</button>
    </nav>
        <script>
        const db = new Dexie("MugShoppDB");
        db.version(10).stores({
            vendas: '++id, data, total',
            gastos: '++id, data, valor',
            clientes: '++id, nome, fone',
            produtos: '++id, nome, preco',
            meta: 'id, valor'
        });

        let carrinho = []; let chartObj = null;

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('content-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
            if(id === 'home') atualizarDash();
            if(id === 'vender') initVender();
            if(id === 'clientes') listarEntidades('clientes');
            if(id === 'produtos') listarEntidades('produtos');
            if(id === 'gastos') { document.getElementById('gasto-data').valueAsDate = new Date(); listarGastos(); }
        }

        async function atualizarDash() {
            const m = await db.meta.get(1);
            document.getElementById('vendas-manual-anterior').value = m ? m.valor : 0;
            const v = await db.vendas.toArray(); const g = await db.gastos.toArray();
            const mesAt = new Date().getMonth();
            const vendasMes = v.filter(x => new Date(x.data).getMonth() === mesAt);
            document.getElementById('vendas-mes-atual').innerText = vendasMes.length;

            const ctx = document.getElementById('chartLinha').getContext('2d');
            if(chartObj) chartObj.destroy();
            
            const labels = ["Vendas (R$)", "Gastos (R$)"];
            const totalV = v.reduce((s, x) => s + x.total, 0);
            const totalG = g.reduce((s, x) => s + x.valor, 0);

            chartObj = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ data: [totalV, totalG], backgroundColor: ['#10b981', '#ef4444'], borderRadius: 10 }] },
                options: { plugins: { legend: { display: false } } }
            });
        }

        async function salvarMeta() {
            const valor = parseInt(document.getElementById('vendas-manual-anterior').value);
            await db.meta.put({id: 1, valor});
        }

        async function initVender() {
            const clis = await db.clientes.toArray(); const prods = await db.produtos.toArray();
            document.getElementById('venda-cliente').innerHTML = '<option value="">Selecionar Cliente</option>' + clis.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            document.getElementById('venda-produto-select').innerHTML = '<option value="">Selecionar Produto</option>' + prods.map(p => `<option value="${p.id}">${p.nome} - R$ ${p.preco}</option>`).join('');
        }

        async function addItem() {
            const id = document.getElementById('venda-produto-select').value;
            if(!id) return;
            const p = await db.produtos.get(parseInt(id));
            carrinho.push({...p});
            renderCarrinho();
        }

        function renderCarrinho() {
            document.getElementById('carrinho-lista').innerHTML = carrinho.map((item, i) => `
                <div class="flex justify-between py-2 text-xs font-bold">
                    <span>${item.nome}</span>
                    <div class="flex gap-4"><span>R$ ${item.preco.toFixed(2)}</span><button onclick="carrinho.splice(${i},1);renderCarrinho()" class="text-red-400">✕</button></div>
                </div>`).join('');
            const total = carrinho.reduce((a, b) => a + b.preco, 0);
            document.getElementById('venda-total-display').innerText = total.toFixed(2).replace('.',',');
        }

        async function salvarVenda() {
            if(carrinho.length === 0) return alert("Carrinho vazio");
            const total = carrinho.reduce((a, b) => a + b.preco, 0);
            const cliente = document.getElementById('venda-cliente').value || "Consumidor";
            const venda = { data: new Date().toISOString().split('T')[0], total, cliente, itens: [...carrinho] };
            await db.vendas.add(venda);
            gerarReciboPDF(venda);
            alert("Venda salva! Gerando recibo...");
            carrinho = []; renderCarrinho();
        }

        function gerarReciboPDF(v) {
            const { jsPDF } = window.jspdf; const doc = new jsPDF({ unit: 'mm', format: [80, 150] });
            doc.setFontSize(10); doc.text("MUGSHOPP PDV", 40, 10, {align:'center'});
            doc.text(`Data: ${v.data} | Cli: ${v.cliente}`, 5, 20);
            let y = 30; v.itens.forEach(i => { doc.text(`${i.nome} - R$ ${i.preco.toFixed(2)}`, 5, y); y += 5; });
            doc.text("---------------------------------", 5, y+2);
            doc.text(`TOTAL: R$ ${v.total.toFixed(2)}`, 5, y+8);
            doc.save(`Recibo_MugShopp_${Date.now()}.pdf`);
        }

        async function salvarEntidade(tipo) {
            const nome = document.getElementById(tipo === 'clientes' ? 'new-cli-nome' : 'new-prod-nome').value;
            const extra = document.getElementById(tipo === 'clientes' ? 'new-cli-fone' : 'new-prod-preco').value;
            if(!nome || !extra) return alert("Preencha os campos!");
            await db[tipo].add(tipo === 'clientes' ? {nome, fone: extra} : {nome, preco: parseFloat(extra)});
            listarEntidades(tipo);
        }

        async function listarEntidades(tipo) {
            const data = await db[tipo].toArray();
            const view = document.getElementById(tipo === 'clientes' ? 'lista-cli-view' : 'lista-prod-view');
            view.innerHTML = data.map(item => `
                <div class="card-3d p-4 flex justify-between items-center bg-white">
                    <div class="flex-1">
                        <input type="text" value="${item.nome}" onchange="editar('${tipo}', ${item.id}, 'nome', this.value)" class="p-1 font-bold text-xs uppercase border-none w-full">
                        <input type="${tipo==='clientes'?'text':'number'}" value="${tipo==='clientes'?item.fone:item.preco}" onchange="editar('${tipo}', ${item.id}, '${tipo==='clientes'?'fone':'preco'}', this.value)" class="p-1 text-[10px] text-gray-400 border-none w-full">
                    </div>
                    <button onclick="db.${tipo}.delete(${item.id}).then(()=>listarEntidades('${tipo}'))" class="text-red-300 ml-2">✕</button>
                </div>`).join('');
        }

        async function editar(tipo, id, campo, valor) {
            let obj = {}; obj[campo] = (campo === 'preco') ? parseFloat(valor) : valor;
            await db[tipo].update(id, obj);
        }

        async function salvarGasto() {
            const valor = parseFloat(document.getElementById('gasto-valor').value);
            await db.gastos.add({ nome: document.getElementById('gasto-nome').value, valor, data: document.getElementById('gasto-data').value });
            listarGastos();
        }

        async function listarGastos() {
            const list = await db.gastos.toArray();
            document.getElementById('lista-gastos').innerHTML = list.map(g => `<div class="card-3d p-4 flex justify-between"><span>${g.nome}</span><span class="text-red-500 font-bold">-R$ ${g.valor}</span></div>`).join('');
        }

        async function exportarBackup() {
            const v = await db.vendas.toArray(); const g = await db.gastos.toArray();
            const c = await db.clientes.toArray(); const p = await db.produtos.toArray();
            const blob = new Blob([JSON.stringify({v,g,c,p})], {type: 'application/json'});
            const url = URL.createObjectURL(blob); const a = document.createElement('a');
            a.href = url; a.download = 'MugShopp_Backup.json'; a.click();
        }

        async function gerarPDFRelatorio() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const v = await db.vendas.toArray();
            doc.text("RELATÓRIO DE VENDAS MUGSHOPP", 14, 15);
            doc.autoTable({ startY: 25, head: [['Data', 'Cliente', 'Total']], body: v.map(x => [x.data, x.cliente, x.total.toFixed(2)]) });
            doc.save("Relatorio_Vendas.pdf");
        }

        window.onload = () => showTab('home');
    </script>
</body>
</html>
