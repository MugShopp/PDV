<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MugShopp PDV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #bf9a5a; --bg: #f8f9fa; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 90px; color: #1a1a1a; }
        .card-3d { background: white; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.02); overflow: hidden; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 600; background: none; border: none; }
        .nav-item.active { color: #10b981; }
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; }
        input, select { border-radius: 12px; border: 1px solid #e2e8f0; padding: 12px; width: 100%; outline: none; font-size: 14px; }
        .btn-gold { background: black; color: white; padding: 14px; border-radius: 14px; font-weight: 700; width: 100%; transition: 0.3s; cursor: pointer; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        .btn-outline { border: 1px solid #e2e8f0; padding: 10px; border-radius: 12px; font-size: 10px; font-weight: bold; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

    <header class="p-4 flex items-center justify-between mb-2">
        <div class="flex items-center gap-3">
            <img src="https://i.postimg.cc/T190pkF7/Copia-de-Novo-Logotipo-2026-20260127-183120-0000.png" class="h-10 w-10 object-contain rounded-full">
            <h1 class="text-lg font-extrabold tracking-tighter">MUGSHOPP <span class="text-[#bf9a5a]">PDV</span></h1>
        </div>
    </header>

    <main class="p-4 max-w-4xl mx-auto">
        <section id="content-home" class="tab-content">
            <div class="card-3d p-6 mb-6">
                <h3 class="text-[10px] font-bold text-gray-400 uppercase mb-4">Fluxo Mensal</h3>
                <canvas id="chartLinha" height="200"></canvas>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="card-3d p-5 text-center"><p class="text-[9px] font-bold text-gray-400 uppercase">Mês Anterior</p><h4 id="vendas-mes-anterior" class="text-2xl font-bold">0</h4></div>
                <div class="card-3d p-5 text-center border-b-4 border-[#10b981]"><p class="text-[9px] font-bold text-[#10b981] uppercase">Mês Atual</p><h4 id="vendas-mes-atual" class="text-2xl font-bold">0</h4></div>
            </div>
        </section>

        <section id="content-vender" class="tab-content hidden">
            <div class="card-3d p-6 space-y-4">
                <select id="venda-cliente"></select>
                <div class="flex gap-2">
                    <select id="venda-produto-select" class="flex-1"></select>
                    <button onclick="addItem()" class="bg-black text-white px-5 rounded-xl font-bold text-xl">+</button>
                </div>
                <div id="carrinho-lista" class="divide-y divide-gray-100"></div>
                <div class="pt-4 border-t space-y-3">
                    <div class="flex justify-between text-gray-400 text-xs"><span>Desconto:</span><input type="number" id="venda-desconto" oninput="calcTotal()" class="w-20 p-1 text-right border-none"></div>
                    <div class="flex justify-between font-bold text-xl"><span>Total:</span><span class="text-[#bf9a5a]">R$ <span id="venda-total-display">0,00</span></span></div>
                    <button onclick="salvarVenda()" class="btn-gold">Emitir Recibo & Salvar</button>
                </div>
            </div>
        </section>

        <section id="content-clientes" class="tab-content hidden space-y-4">
            <div class="card-3d p-6 space-y-3">
                <input type="text" id="new-cli-nome" placeholder="Nome do Cliente">
                <input type="text" id="new-cli-fone" placeholder="Telefone">
                <button onclick="adicionarManual('clientes')" class="btn-gold">Adicionar Cliente</button>
                <label class="btn-outline block">Upload Lista CSV (Clientes)<input type="file" class="hidden" accept=".csv" onchange="importarCSV(this, 'clientes')"></label>
            </div>
            <div id="lista-cli-view" class="space-y-3"></div>
        </section>

        <section id="content-produtos" class="tab-content hidden space-y-4">
            <div class="card-3d p-6 space-y-3">
                <input type="text" id="new-prod-nome" placeholder="Nome do Produto">
                <input type="number" id="new-prod-preco" placeholder="Preço (R$)">
                <button onclick="adicionarManual('produtos')" class="btn-gold">Salvar Produto</button>
                <label class="btn-outline block">Upload Lista CSV (Produtos)<input type="file" class="hidden" accept=".csv" onchange="importarCSV(this, 'produtos')"></label>
            </div>
            <div id="lista-prod-view" class="grid grid-cols-1 gap-3"></div>
        </section>

        <section id="content-gastos" class="tab-content hidden space-y-4">
            <div class="card-3d p-6 space-y-3">
                <input type="text" id="gasto-nome" placeholder="Descrição">
                <input type="number" id="gasto-valor" placeholder="Valor R$">
                <input type="date" id="gasto-data">
                <button onclick="salvarGasto()" class="btn-gold">Salvar Gasto</button>
            </div>
            <div id="lista-gastos" class="space-y-3"></div>
        </section>

        <section id="content-config" class="tab-content hidden space-y-4">
            <div class="card-3d p-6 text-center">
                <h3 class="font-bold text-xs uppercase mb-6 text-[#bf9a5a]">Relatórios Financeiros</h3>
                <button onclick="gerarRelatorioVendas()" class="btn-outline w-full mb-3">Relatório de Vendas (PDF)</button>
                <button onclick="gerarRelatorioComparativo()" class="btn-outline w-full mb-3">Entradas x Saídas (PDF)</button>
                <div class="grid grid-cols-2 gap-2 mt-4 pt-4 border-t">
                    <button onclick="exportarBackup()" class="text-[9px] font-bold uppercase p-3 bg-gray-50 rounded-xl">Backup JSON</button>
                    <label class="text-[9px] font-bold uppercase p-3 bg-gray-50 rounded-xl cursor-pointer">Importar JSON<input type="file" class="hidden" onchange="importarBackup(event)"></label>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button onclick="showTab('home')" id="nav-home" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>Home</button>
        <button onclick="showTab('vender')" id="nav-vender" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>Vender</button>
        <button onclick="showTab('clientes')" id="nav-clientes" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>Clientes</button>
        <button onclick="showTab('produtos')" id="nav-produtos" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>Estoque</button>
        <button onclick="showTab('gastos')" id="nav-gastos" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line></svg>Gastos</button>
        <button onclick="showTab('config')" id="nav-config" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>Ajustes</button>
    </nav>
        <script>
        const db = new Dexie("MugShoppDB");
        db.version(8).stores({
            vendas: '++id, data, total',
            gastos: '++id, data, valor',
            clientes: '++id, nome, fone',
            produtos: '++id, nome, preco'
        });

        let carrinho = []; let chartObj = null;

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('content-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
            
            if(id === 'home') atualizarDash();
            if(id === 'vender') initVender();
            if(id === 'clientes') listarClientes();
            if(id === 'produtos') listarProdutos();
            if(id === 'gastos') listarGastos();
        }

        async function atualizarDash() {
            const agora = new Date();
            const mesAtual = agora.getMonth(); const anoAtual = agora.getFullYear();
            const v = await db.vendas.toArray(); const g = await db.gastos.toArray();

            const vAt = v.filter(x => new Date(x.data).getMonth() === mesAtual).length;
            const vAnt = v.filter(x => new Date(x.data).getMonth() === (mesAtual === 0 ? 11 : mesAtual - 1)).length;

            document.getElementById('vendas-mes-atual').innerText = vAt;
            document.getElementById('vendas-mes-anterior').innerText = vAnt;

            // Lógica do gráfico simplificada para visualização rápida
            const ctx = document.getElementById('chartLinha').getContext('2d');
            if(chartObj) chartObj.destroy();
            chartObj = new Chart(ctx, {
                type: 'line',
                data: { labels: ['S1','S2','S3','S4'], datasets: [{ label:'Vendas', data:[10, 25, vAt*5, vAt*10], borderColor:'#10b981', tension:0.4 }] },
                options: { scales: { y: { display: false } } }
            });
        }

        async function initVender() {
            const clis = await db.clientes.toArray();
            const prods = await db.produtos.toArray();
            document.getElementById('venda-cliente').innerHTML = '<option value="">Selecionar Cliente</option>' + clis.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
            document.getElementById('venda-produto-select').innerHTML = '<option value="">Selecionar Produto</option>' + prods.map(p => `<option value="${p.id}">${p.nome} - R$ ${p.preco}</option>`).join('');
        }

        async function addItem() {
            const id = document.getElementById('venda-produto-select').value;
            if(!id) return;
            const p = await db.produtos.get(parseInt(id));
            carrinho.push({...p, subtotal: p.preco});
            renderCarrinho();
        }

        function renderCarrinho() {
            document.getElementById('carrinho-lista').innerHTML = carrinho.map((item, i) => `
                <div class="flex justify-between py-2 text-sm font-bold">
                    <span>${item.nome}</span>
                    <div class="flex gap-4"><span>R$ ${item.preco.toFixed(2)}</span><button onclick="remove(${i})" class="text-red-400">✕</button></div>
                </div>`).join('');
            calcTotal();
        }

        function calcTotal() {
            const sub = carrinho.reduce((a, b) => a + b.subtotal, 0);
            const desc = parseFloat(document.getElementById('venda-desconto').value) || 0;
            const total = sub - desc;
            document.getElementById('venda-total-display').innerText = total.toFixed(2).replace('.',',');
            return total;
        }

        async function salvarVenda() {
            const total = calcTotal();
            if(carrinho.length === 0) return alert("Carrinho vazio!");
            await db.vendas.add({ data: new Date().toISOString().split('T')[0], total: total, itens: [...carrinho] });
            alert("Venda Finalizada com Sucesso!");
            carrinho = []; renderCarrinho();
        }

        async function adicionarManual(tipo) {
            if(tipo === 'clientes') {
                const nome = document.getElementById('new-cli-nome').value;
                await db.clientes.add({ nome, fone: document.getElementById('new-cli-fone').value });
                listarClientes();
            } else {
                const nome = document.getElementById('new-prod-nome').value;
                const preco = parseFloat(document.getElementById('new-prod-preco').value);
                await db.produtos.add({ nome, preco });
                listarProdutos();
            }
            alert("Salvo!");
        }

        async function listarClientes() {
            const list = await db.clientes.toArray();
            document.getElementById('lista-cli-view').innerHTML = list.map(c => `
                <div class="card-3d p-4 flex justify-between">
                    <div><p class="font-bold text-sm uppercase">${c.nome}</p><p class="text-xs text-gray-400">${c.fone || ''}</p></div>
                    <button onclick="db.clientes.delete(${c.id}).then(listarClientes)" class="text-red-300">Excluir</button>
                </div>`).join('');
        }

        async function listarProdutos() {
            const list = await db.produtos.toArray();
            document.getElementById('lista-prod-view').innerHTML = list.map(p => `
                <div class="card-3d p-4 flex justify-between items-center">
                    <p class="font-bold text-xs uppercase">${p.nome}</p>
                    <p class="font-bold text-[#bf9a5a]">R$ ${p.preco.toFixed(2)}</p>
                    <button onclick="db.produtos.delete(${p.id}).then(listarProdutos)" class="text-red-300">✕</button>
                </div>`).join('');
        }

        function importarCSV(input, tipo) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = async (e) => {
                const lines = e.target.result.split('\n');
                for(let line of lines) {
                    const data = line.split(',');
                    if(data.length >= 2) {
                        if(tipo === 'clientes') await db.clientes.add({ nome: data[0].trim(), fone: data[1].trim() });
                        else await db.produtos.add({ nome: data[0].trim(), preco: parseFloat(data[1].trim()) });
                    }
                }
                alert("Importação Concluída!");
                tipo === 'clientes' ? listarClientes() : listarProdutos();
            };
            reader.readAsText(file);
        }

        async function salvarGasto() {
            const valor = parseFloat(document.getElementById('gasto-valor').value);
            await db.gastos.add({ nome: document.getElementById('gasto-nome').value, valor, data: document.getElementById('gasto-data').value });
            listarGastos();
        }

        async function listarGastos() {
            const list = await db.gastos.toArray();
            document.getElementById('lista-gastos').innerHTML = list.map(g => `<div class="card-3d p-4 flex justify-between"><span>${g.nome}</span><span class="text-red-500 font-bold">-R$ ${g.valor}</span></div>`).join('');
        }

        function remove(i) { carrinho.splice(i,1); renderCarrinho(); }
        window.onload = () => showTab('home');
    </script>
</body>
</html>
